name: Sync Celestrak catalogue

on:
  schedule:
    - cron: '17 */2 * * *'   # every 2h, offset from the hour
  workflow_dispatch:          # manual run button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GP catalogue (CSV)
        run: |
          curl -sSf --retry 3 --retry-delay 30 \
            -A "gosatt-catalogue-sync (github.com/${{ github.repository }})" \
            -o active.csv.new \
            "https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=csv"

      - name: Validate before publishing
        run: |
          # Header must be the GP CSV header, and the file must be
          # non-trivially sized (rate-limit messages are ~141 bytes).
          head -c 200 active.csv.new | grep -q "OBJECT_NAME" || { echo "Bad header"; exit 1; }
          [ "$(wc -c < active.csv.new)" -gt 100000 ] || { echo "File too small"; exit 1; }
          mv active.csv.new active.csv

      - name: Commit if changed
        run: |
          git config user.name "catalogue-bot"
          git config user.email "actions@github.com"
          git add active.csv
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "Catalogue sync $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
